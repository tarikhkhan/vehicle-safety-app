<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Safety QR Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); max-width: 450px; width: 100%; }
        h2 { color: #1f2937; margin-top: 0; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #4b5563; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; background-color: #2563eb; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #1d4ed8; }
        #qr-result { margin-top: 25px; text-align: center; display: none; border-top: 2px dashed #e5e7eb; padding-top: 20px; }
        #qrcode { display: inline-block; margin-top: 15px; padding: 10px; background: white; border: 1px solid #e5e7eb; border-radius: 8px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="container">
    <h2>Vehicle Safety Setup</h2>
    
    <form id="ownerForm">
        <div class="form-group">
            <label for="ownerName">Owner's Full Name</label>
            <input type="text" id="ownerName" placeholder="John Doe" required>
        </div>
        <div class="form-group">
            <label for="vehicleNum">Vehicle Registration Number</label>
            <input type="text" id="vehicleNum" placeholder="JH15C1011" required>
        </div>
        <div class="form-group">
            <label for="ownerPhone">Owner Phone Number</label>
            <input type="tel" id="ownerPhone" placeholder="+91 XXXXX XXXXX" required>
        </div>
        <div class="form-group">
            <label for="familyPhone">Emergency Family Contact</label>
            <input type="tel" id="familyPhone" placeholder="+91 XXXXX XXXXX" required>
        </div>
        <button type="submit" id="submitBtn">Save & Generate QR Code</button>
    </form>

    <div id="qr-result">
        <h3 style="color: #111827; margin: 0;">Your Vehicle Safety QR Code</h3>
        <p style="font-size: 13px; color: #6b7280; margin: 5px 0 15px 0;">Data saved securely. Print this code for your windshield.</p>
        <div id="qrcode"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA1sceC-a_3NgfYS0gnOER9zrNWTdoGrV8",
        authDomain: "vehicle-safety-qr.firebaseapp.com",
        projectId: "vehicle-safety-qr",
        storageBucket: "vehicle-safety-qr.firebasestorage.app",
        messagingSenderId: "1030644517517",
        appId: "1:1030644517517:web:0a3de6be715bc9045a30c4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    function generateUniqueId() {
        return 'v-' + Math.random().toString(36).substr(2, 9);
    }

    document.getElementById('ownerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = "Saving to secure database...";
        submitBtn.disabled = true;

        const ownerData = {
            name: document.getElementById('ownerName').value,
            vehicle: document.getElementById('vehicleNum').value,
            phone: document.getElementById('ownerPhone').value,
            emergencyPhone: document.getElementById('familyPhone').value,
            createdAt: new Date().toISOString()
        };

        const vehicleId = generateUniqueId();

        try {
            await setDoc(doc(db, "vehicles", vehicleId), ownerData);

            const qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = "";
// 1. Get the base domain (e.g., https://username.github.io)
const baseDomain = window.location.origin;

// 2. Get the current sub-folder path (e.g., /vehicle-safety/)
// This ensures it works perfectly whether testing locally OR hosted on GitHub pages!
const folderPath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);

// 3. Combine them to form the absolute path to your view file
// Replace 'yourusername' with your actual GitHub username!
const scanUrl = `https://tarikhkhan.github.io/vehicle-safety/view-vehicle.html?id=${vehicleId}`;

// 4. Generate the QR Code
new QRCode(qrContainer, {
    text: scanUrl,
    width: 200,
    height: 200,
    colorDark : "#0f172a",
    colorLight : "#ffffff",
    correctLevel : QRCode.CorrectLevel.H
});
            // Dynamic tracking string that targets view-vehicle.html cleanly
// TO THIS (Replace 192.168.1.15 with your actual IPv4 address from Step 1):

            document.getElementById('qr-result').style.display = 'block';
            submitBtn.innerText = "Save & Generate QR Code";
            submitBtn.disabled = false;

        } catch (error) {
            console.error("Error saving data to Firebase: ", error);
            alert("Something went wrong saving details to the database.");
            submitBtn.innerText = "Save & Generate QR Code";
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
